# SonarCloud 프로젝트 키(대시보드 · sonar-issues.json과 동일)
sonar.projectKey=Yamang02_YamangDesign
sonar.projectName=YamangDesign
sonar.projectVersion=1.0

# SonarCloud (로컬 SonarQube 쓸 때는 아래 두 줄 주석 처리 후 sonar.host.url 등만 설정)
sonar.host.url=https://sonarcloud.io
sonar.organization=yamang02

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
